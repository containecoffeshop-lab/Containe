<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="icon" href="../Logo/containe.png">
    <meta charset="UTF-8">
    <title>POS Dashboard</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        display: flex;
        height: 100vh;
      }
      /* Sidebar */
      .sidebar {
        width: 220px;
        background: #2c3e50;
        color: #fff;
        display: flex;
        flex-direction: column;
        padding: 20px 0;
      }
      .sidebar h2 {
        text-align: center;
        margin-bottom: 20px;
      }
      .nav-item {
        padding: 12px 20px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .nav-item:hover {
        background: rgba(255,255,255,0.2);
      }
      /* Main content */
      .main {
        flex: 1;
        background: #ecf0f1;
        padding: 0;
        overflow: hidden;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>POS</h2>
    <div class="nav-item" onclick="loadPage('menu.html')">Menu Items</div>
    <div class="nav-item" onclick="loadPage('transactions.html')">Transactions</div>
    <div class="nav-item" onclick="loadPage('stock.html')">Stock Movements</div>
    <div class="nav-item" onclick="loadPage('users.html')">Users</div>
    <div class="nav-item" onclick="loadPage('roles.html')">Roles</div>
    <div class="nav-item" onclick="loadPage('permissions.html')">Permissions</div>
    <div class="nav-item" onclick="loadPage('suppliers.html')">Suppliers</div>
    <div class="nav-item" onclick="loadPage('recipes.html')">Recipes</div>
    <div class="nav-item" onclick="loadPage('reports.html')">Reports</div>
  </div>

  <!-- Main content -->
  <div class="main">
    <!-- iframe menampilkan halaman modul -->
    <iframe id="contentFrame" src="menu.html"></iframe>
  </div>

  <script>
    function loadPage(page) {
      document.getElementById("contentFrame").src = page;
    }
  </script>
</body>
</html>
